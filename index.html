<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FlySmart — Sign in</title>
<meta name="description" content="Sign in to FlySmart." />
<link rel="icon" href="shared/img/logo-color.png" />
<!-- shared self-hosted fonts (no CDN; offline) -->
<link rel="stylesheet" href="shared/css/tokens.css" />
<!-- restore the saved day/night choice before first paint (shared across all screens) -->
<script>try{if(localStorage.getItem("fs-theme")==="night")document.documentElement.setAttribute("data-theme","night");}catch(e){}</script>
<style>
  /* Typefaces are provided by shared/css/tokens.css (no CDN; offline) */
  :root{
    --ink:#0b2444; --ink-2:#3a5470; --ink-3:#56708a;
    --azure:#0b6bff; --azure-deep:#0a47c2; --azure-soft:rgba(11,107,255,.14);
    --danger:#c62828;
    --glass:rgba(255,255,255,.56); --glass-2:rgba(255,255,255,.36);
    --glass-edge:rgba(255,255,255,.72);
    --field:rgba(255,255,255,.66); --field-hover:rgba(255,255,255,.8); --field-focus:rgba(255,255,255,.95);
    --divider:rgba(255,255,255,.6);
    --page-bg:#9fc6ee;
    --shadow:0 30px 80px -30px rgba(8,24,53,.6), 0 10px 24px -14px rgba(8,24,53,.4);
    --body:"Manrope",system-ui,sans-serif;
    --display:"Bricolage Grotesque",var(--body);
    --t:200ms cubic-bezier(.2,.7,.3,1);
  }
  /* ---------- NIGHT THEME ---------- */
  html[data-theme="night"]{
    --ink:#eef4ff; --ink-2:#aebed8; --ink-3:#8093b0;
    --azure-soft:rgba(120,170,255,.22); --danger:#ff8a8a;
    --glass:rgba(18,30,58,.50); --glass-2:rgba(12,22,46,.34);
    --glass-edge:rgba(170,196,238,.22);
    --field:rgba(255,255,255,.07); --field-hover:rgba(255,255,255,.12); --field-focus:rgba(255,255,255,.16);
    --divider:rgba(170,196,238,.28);
    --page-bg:#0a1430;
    --shadow:0 30px 80px -30px rgba(0,0,8,.75), 0 10px 24px -14px rgba(0,0,8,.55);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{-webkit-text-size-adjust:100%}
  body{font-family:var(--body);color:var(--ink);min-height:100svh;min-height:100dvh;
    overflow-x:hidden;-webkit-font-smoothing:antialiased;background:var(--page-bg);
    transition:background var(--t),color var(--t)}

  /* two stacked background videos: day shows by default, night fades in */
  .bg{position:fixed;inset:0;width:100%;height:100%;object-fit:cover;transition:opacity .5s ease;
    transform:translateZ(0);backface-visibility:hidden;will-change:opacity}
  .bg.day{z-index:-3;opacity:1}
  .bg.night{z-index:-2;opacity:0}
  html[data-theme="night"] .bg.day{opacity:0}
  html[data-theme="night"] .bg.night{opacity:1}
  .scrim{position:fixed;inset:0;z-index:-1;pointer-events:none;
    background:radial-gradient(140% 130% at 28% 40%, rgba(255,255,255,0) 46%, rgba(8,24,53,.22) 100%)}

  main{min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px}

  .panel{position:relative;
    background:linear-gradient(140deg,var(--glass),var(--glass-2));
    border:1px solid var(--glass-edge);box-shadow:var(--shadow);
    backdrop-filter:blur(24px) saturate(140%);-webkit-backdrop-filter:blur(24px) saturate(140%)}
  .panel::before{content:"";position:absolute;inset:0;padding:1px;pointer-events:none;border-radius:inherit;
    background:linear-gradient(140deg,rgba(255,255,255,.9),rgba(255,255,255,0) 42%);
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);
    -webkit-mask-composite:xor;mask-composite:exclude}

  /* base / mobile: centered rounded card */
  .panel{width:min(400px,100%);border-radius:26px}
  .inner{padding:clamp(14px,3.5vw,20px) clamp(22px,6vw,30px)}

  /* desktop: full-height login on the left with a straight divider, video to the right */
  @media(min-width:900px){
    main{display:block;padding:0}
    .panel{position:fixed;left:0;top:0;height:100dvh;
      width:clamp(420px,34vw,500px);
      border:0;border-right:1px solid var(--divider);border-radius:0;
      box-shadow:24px 0 64px -26px rgba(8,24,53,.55);
      display:grid;place-items:safe center;overflow-y:auto;padding-block:24px}
    .panel::before{display:none}
    .inner{width:min(360px,82%);padding:0}
    .inner .brand-logo{height:142px;width:auto}
    .inner .brand-word{font-size:40px}
  }

  /* ----- login block ----- */
  .inner{display:flex;flex-direction:column}

  /* brand: big colour logo, FLYSMART wordmark, tagline — all centred */
  .brand{display:flex;flex-direction:column;align-items:center;text-align:center;gap:4px;margin-top:0}
  .brand-logo{height:124px;width:auto;object-fit:contain;filter:drop-shadow(0 16px 26px rgba(8,24,53,.30));margin-bottom:8px}
  .brand-word{font-family:var(--display);font-weight:800;font-size:32px;line-height:1;letter-spacing:.06em;color:var(--ink)}
  .brand-tag{color:var(--ink-2);font-size:13.5px;font-weight:500}

  /* chat-style day/night toggle, inside the panel, top-right */
  .topbar-theme{position:absolute;right:16px;top:16px;z-index:6;display:grid;place-items:center;width:42px;height:42px;border-radius:50%;cursor:pointer;
    background:var(--glass);border:1px solid var(--glass-edge);box-shadow:0 10px 22px -12px rgba(8,24,53,.5);color:var(--ink-2);
    -webkit-backdrop-filter:blur(10px) saturate(140%);backdrop-filter:blur(10px) saturate(140%);transition:transform var(--t),color var(--t),border-color var(--t)}
  .topbar-theme:hover{transform:translateY(-1px);color:var(--azure);border-color:var(--azure)}
  .topbar-theme:focus-visible{outline:2px solid var(--azure);outline-offset:2px}
  .topbar-theme svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:1.9;stroke-linecap:round;stroke-linejoin:round}
  .topbar-theme .t-moon{display:none}
  html[data-theme="night"] .topbar-theme .t-sun{display:none}
  html[data-theme="night"] .topbar-theme .t-moon{display:block}

  form{margin-top:12px;display:flex;flex-direction:column;gap:12px}
  .field>label{font-size:13px;font-weight:600;color:var(--ink-2);display:block;margin-bottom:5px}
  .input{position:relative;display:flex;align-items:center}
  .input input{width:100%;font-family:var(--body);font-size:16px;color:var(--ink);
    height:52px;padding:0 52px 0 16px;border-radius:12px;
    background:var(--field);border:1.5px solid var(--glass-edge);outline:none;
    transition:border-color var(--t),box-shadow var(--t),background var(--t)}
  .input input::placeholder{color:var(--ink-3)}
  .input input:focus::placeholder{color:transparent}
  .input input:hover{background:var(--field-hover)}
  .input input:focus{background:var(--field-focus);border-color:var(--azure);box-shadow:0 0 0 4px var(--azure-soft)}
  .toggle{position:absolute;right:6px;width:44px;height:44px;border:0;background:none;cursor:pointer;
    display:grid;place-items:center;border-radius:10px;color:var(--ink-3);transition:color var(--t),background var(--t)}
  .toggle:hover{color:var(--ink);background:rgba(127,160,210,.16)}
  .toggle:focus-visible{outline:2px solid var(--azure);outline-offset:2px}
  .toggle svg{width:19px;height:19px;fill:none;stroke:currentColor;stroke-width:1.7}

  .field.invalid input{border-color:var(--danger);box-shadow:0 0 0 4px rgba(198,40,40,.12)}
  .err{display:none;align-items:center;gap:5px;margin-top:5px;color:var(--danger);font-size:12px;font-weight:500;line-height:1.2}
  .err svg{width:14px;height:14px;flex:none;fill:none;stroke:currentColor;stroke-width:2}
  .field.invalid .err{display:flex}

  /* remember-me + forgot-password row */
  .form-row{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:-2px}
  .remember{display:inline-flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-2);cursor:pointer;user-select:none}
  /* checkbox matched to the platform's .dd-box (themed via tokens → respects day/night) */
  .remember input{appearance:none;-webkit-appearance:none;margin:0;flex:none;position:relative;
    width:18px;height:18px;border-radius:5px;border:1.5px solid var(--ink-3);background:transparent;cursor:pointer;
    transition:background var(--t),border-color var(--t)}
  .remember input:hover{border-color:var(--azure)}
  .remember input:checked{background:var(--azure);border-color:var(--azure)}
  .remember input:checked::after{content:"";position:absolute;left:5px;top:1.5px;width:5px;height:9px;
    border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg)}
  .remember input:focus-visible{outline:2px solid var(--azure);outline-offset:2px}
  .link{font:inherit;font-size:13px;font-weight:600;color:var(--azure);background:none;border:0;cursor:pointer;padding:2px;border-radius:6px}
  .link:hover{text-decoration:underline}
  .link:focus-visible{outline:2px solid var(--azure);outline-offset:2px}

  .btn{margin-top:4px;position:relative;overflow:hidden;cursor:pointer;border:0;width:100%;
    font-family:var(--body);font-weight:700;font-size:15.5px;color:#fff;height:52px;
    padding:0 20px;border-radius:12px;background:linear-gradient(135deg,#1372ff,#0a3fb0);
    box-shadow:0 14px 28px -12px rgba(11,107,255,.7), inset 0 1px 0 rgba(255,255,255,.32);
    display:flex;align-items:center;justify-content:center;gap:10px;
    transition:transform 150ms ease,box-shadow var(--t),filter var(--t),background var(--t)}
  .btn:hover{transform:translateY(-1px);box-shadow:0 18px 34px -12px rgba(11,107,255,.82)}
  .btn:active{transform:translateY(0)}
  .btn:focus-visible{outline:2px solid #fff;outline-offset:3px}
  .btn[disabled]{cursor:default}
  .btn>svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
  .btn .spin{display:none;width:18px;height:18px;border:2.5px solid rgba(255,255,255,.4);
    border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite}
  .btn.loading .spin{display:inline-block}
  .btn.loading .label,.btn.loading .arrow,.btn .check{display:none}
  @keyframes spin{to{transform:rotate(360deg)}}

  /* social sign-in */
  .social{margin-top:12px;display:flex;flex-direction:column;gap:11px}
  .or{display:flex;align-items:center;gap:12px;color:var(--ink-3);font-size:12px;letter-spacing:.02em}
  .or::before,.or::after{content:"";flex:1;height:1px;background:var(--divider)}
  .social-btns{display:flex;gap:10px}
  .social-btn{flex:1;height:46px;display:inline-flex;align-items:center;justify-content:center;gap:8px;border-radius:12px;cursor:pointer;
    background:var(--field);border:1.5px solid var(--glass-edge);color:var(--ink);font-weight:600;font-size:13px;
    transition:background var(--t),border-color var(--t),transform 150ms ease}
  .social-btn:hover{background:var(--field-hover);border-color:var(--azure);transform:translateY(-1px)}
  .social-btn:focus-visible{outline:2px solid var(--azure);outline-offset:2px}
  .social-btn svg{width:20px;height:20px}

  /* sign-up + demo */
  .signup{margin-top:10px;text-align:center;font-size:13px;color:var(--ink-2)}
  .demo-hint{margin-top:8px;text-align:center;font-size:12.5px;color:var(--ink-3)}
  .demo-link{font:inherit;font-weight:700;color:var(--azure);background:none;border:0;padding:2px 5px;cursor:pointer;border-radius:6px}
  .demo-link:hover{text-decoration:underline}
  .demo-link:focus-visible{outline:2px solid var(--azure);outline-offset:2px}

  /* toast (mock actions) */
  .toast-host{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:8px;align-items:center;pointer-events:none}
  .toast{background:rgba(11,24,48,.94);color:#fff;padding:10px 16px;border-radius:999px;font-size:13px;font-weight:600;box-shadow:0 14px 34px -12px rgba(0,0,8,.6);animation:toastIn .3s cubic-bezier(.2,.7,.3,1)}
  @keyframes toastIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}

  /* entrance animation */
  .r{opacity:1}
  .anim .r{opacity:0;transform:translateY(12px);animation:rise .55s cubic-bezier(.2,.7,.3,1) forwards}
  @keyframes rise{to{opacity:1;transform:none}}

  /* Telegram-style circular reveal (View Transitions API) */
  ::view-transition-old(root),::view-transition-new(root){animation:none;mix-blend-mode:normal}
  ::view-transition-new(root){z-index:9999}
  ::view-transition-old(root){z-index:1}

  /* short viewports: scale the brand + rhythm down so the form always fits with no scroll */
  @media(max-height:780px){
    .brand-logo{height:108px;width:auto}
    .brand-word{font-size:28px}
    form{margin-top:11px;gap:11px}
    .input input{height:50px}
  }
  @media(max-height:680px){
    .brand-logo{height:86px;width:auto}
    .brand-word{font-size:25px}
    .brand-tag{font-size:12.5px}
    form{margin-top:9px;gap:9px}
    .field>label{margin-bottom:4px}
    .input input{height:46px}
    .btn{height:48px}
    .social-btn{height:42px}
    .social{margin-top:9px}
    .signup{margin-top:7px}
    .demo-hint{margin-top:5px}
  }
  @media(max-height:600px){
    main{padding:8px}
    .brand-logo{height:70px;width:auto}
    .brand-word{font-size:22px}
    form{margin-top:7px;gap:7px}
    .err{margin-top:4px}
    .input input{height:44px}
    .btn{height:44px}
    .social-btn{height:40px}
  }

  @media(prefers-reduced-motion:reduce){
    *{animation-duration:.001ms!important;transition-duration:.001ms!important}
    .r{opacity:1!important;transform:none!important}
  }
</style>
</head>
<body>
  <video class="bg day" autoplay muted loop playsinline preload="auto" poster="login/poster-day.jpg?v=3" aria-hidden="true">
    <source src="login/bg-day.mp4?v=3" type="video/mp4" />
  </video>
  <video class="bg night" autoplay muted loop playsinline preload="auto" poster="login/poster-night.jpg?v=3" aria-hidden="true">
    <source src="login/bg-night.mp4?v=3" type="video/mp4" />
  </video>
  <div class="scrim"></div>

  <main>
    <section class="panel" aria-labelledby="brandWord">
      <div class="inner">
        <button class="topbar-theme" id="themeToggle" type="button" aria-label="Toggle light / dark theme" title="Toggle theme">
          <svg class="t-sun" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2"/></svg>
          <svg class="t-moon" viewBox="0 0 24 24" aria-hidden="true"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>
        </button>

        <div class="brand r" style="animation-delay:.06s">
          <img class="brand-logo" src="shared/img/logo-login.png" alt="FlySmart logo" />
          <h1 class="brand-word" id="brandWord">FLYSMART</h1>
          <p class="brand-tag">Your Smart way to Fly</p>
        </div>

        <form id="loginForm" novalidate>
          <div class="field r" style="animation-delay:.16s">
            <label for="email">Email address</label>
            <div class="input">
              <input id="email" name="email" type="email" inputmode="email" autocomplete="email"
                     placeholder="you@airline.com" required aria-required="true" aria-describedby="email-err" />
            </div>
            <p class="err" id="email-err" role="alert"><svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 7v6M12 16.5h.01"/></svg><span></span></p>
          </div>

          <div class="field r" style="animation-delay:.22s">
            <label for="password">Password</label>
            <div class="input">
              <input id="password" name="password" type="password" autocomplete="current-password"
                     placeholder="Enter your password" required aria-required="true" aria-describedby="password-err" />
              <button type="button" class="toggle" id="toggle" aria-label="Show password" aria-pressed="false">
                <svg id="eye" viewBox="0 0 24 24" aria-hidden="true"><path d="M2 12s3.6-7 10-7 10 7 10 7-3.6 7-10 7S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/></svg>
              </button>
            </div>
            <p class="err" id="password-err" role="alert"><svg viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 7v6M12 16.5h.01"/></svg><span></span></p>
          </div>

          <div class="form-row r" style="animation-delay:.28s">
            <label class="remember"><input type="checkbox" id="remember" /><span>Remember me</span></label>
            <button type="button" class="link" data-action="forgot">Forgot password?</button>
          </div>

          <button class="btn r" id="submit" type="submit" style="animation-delay:.32s">
            <span class="spin" aria-hidden="true"></span>
            <span class="label">Sign in</span>
            <svg class="arrow" viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
            <svg class="check" viewBox="0 0 24 24" aria-hidden="true" style="display:none"><path d="M20 6 9 17l-5-5"/></svg>
          </button>
        </form>

        <div class="social r" style="animation-delay:.4s">
          <div class="or"><span>or continue with</span></div>
          <div class="social-btns">
            <button type="button" class="social-btn" data-social="Google" aria-label="Continue with Google" title="Google">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="#4285F4" d="M23.5 12.3c0-.8-.1-1.6-.2-2.3H12v4.5h6.4c-.3 1.5-1.1 2.7-2.4 3.6v3h3.9c2.3-2.1 3.6-5.2 3.6-8.8z"/><path fill="#34A853" d="M12 24c3.2 0 6-1.1 8-2.9l-3.9-3c-1.1.7-2.5 1.2-4.1 1.2-3.1 0-5.8-2.1-6.7-5H1.3v3.1C3.3 21.3 7.3 24 12 24z"/><path fill="#FBBC05" d="M5.3 14.3c-.2-.7-.4-1.5-.4-2.3s.1-1.6.4-2.3V6.6H1.3C.5 8.2 0 10 0 12s.5 3.8 1.3 5.4l4-3.1z"/><path fill="#EA4335" d="M12 4.8c1.8 0 3.3.6 4.6 1.8l3.4-3.4C18 1.2 15.2 0 12 0 7.3 0 3.3 2.7 1.3 6.6l4 3.1c.9-2.9 3.6-4.9 6.7-4.9z"/></svg>
            </button>
            <button type="button" class="social-btn" data-social="Apple" aria-label="Continue with Apple" title="Apple">
              <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M16.4 12.7c0-2.4 1.95-3.55 2.05-3.6-1.12-1.64-2.86-1.87-3.48-1.9-1.48-.15-2.89.87-3.64.87-.75 0-1.91-.85-3.14-.83-1.62.02-3.11.94-3.94 2.39-1.68 2.92-.43 7.24 1.2 9.61.8 1.16 1.75 2.46 3 2.41 1.2-.05 1.66-.78 3.11-.78 1.45 0 1.86.78 3.14.75 1.3-.02 2.12-1.18 2.91-2.35.92-1.35 1.3-2.66 1.32-2.73-.03-.01-2.53-.97-2.55-3.84zM14.03 5.2c.66-.8 1.11-1.92.99-3.03-.95.04-2.1.63-2.79 1.43-.61.71-1.15 1.85-1.01 2.94 1.06.08 2.15-.54 2.81-1.34z"/></svg>
            </button>
            <button type="button" class="social-btn" data-social="Microsoft" aria-label="Continue with Microsoft" title="Microsoft">
              <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="1" y="1" width="10" height="10" fill="#F25022"/><rect x="13" y="1" width="10" height="10" fill="#7FBA00"/><rect x="1" y="13" width="10" height="10" fill="#00A4EF"/><rect x="13" y="13" width="10" height="10" fill="#FFB900"/></svg>
            </button>
          </div>
        </div>

        <p class="signup r" style="animation-delay:.46s">Don't have an account? <button type="button" class="link" data-action="signup">Sign up</button></p>

        <div class="demo-hint r" style="animation-delay:.5s">
          Demo — fill
          <button type="button" class="demo-link" data-fill="admin">admin</button>
          <span aria-hidden="true">·</span>
          <button type="button" class="demo-link" data-fill="user">technician</button>
        </div>
      </div>
    </section>
